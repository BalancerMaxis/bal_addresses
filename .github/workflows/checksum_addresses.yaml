name: Checksum Addresses

on:
  pull_request_target:
    paths:
      - 'config/*.json'
      - 'extras/*.json'

jobs:
  checksum-addresses:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Use trusted script from base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          git checkout "origin/$BASE_REF" -- scripts/validate_checksums.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install eth-utils "eth-hash[pycryptodome]"

      - name: Fix address checksums
        run: python scripts/validate_checksums.py --fix

      - name: Push fixes to PR branch
        run: |
          git checkout -- scripts/validate_checksums.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/*.json extras/*.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: checksum addresses"
            git push
          fi
