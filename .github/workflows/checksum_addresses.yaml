name: Checksum Addresses

on:
  pull_request_target:
    paths:
      - 'config/*.json'
      - 'extras/*.json'

jobs:
  checksum-addresses:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout base (trusted script)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Overlay PR JSON files
        run: |
          git fetch origin "${{ github.event.pull_request.head.sha }}"
          git checkout "${{ github.event.pull_request.head.sha }}" -- config/ extras/ 2>/dev/null || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install eth-utils

      - name: Fix address checksums
        run: python scripts/validate_checksums.py --fix

      - name: Push fixes to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/*.json extras/*.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: checksum addresses"
            git push origin HEAD:${{ github.head_ref }}
          fi
